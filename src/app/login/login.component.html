<!--The Login form validates username and password: minLength=6-->


    <div class="login-root">
        <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
            <div class="form-outer">
                <div class="form">
                    <div class="form-group padding-horizontal--48">
                        <div class="field padding-bottom--24">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" name="username" [(ngModel)]="form.username" required
                                #username="ngModel" [ngClass]="{ 'is-valid': f.submitted && username.errors }" />
                            <div *ngIf="username.errors && f.submitted" class="invalid-feedback">
                                Username is required!
                            </div>
                        </div>
                        <div class="field padding-bottom--24">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" name="password" [(ngModel)]="form.password"
                                required minlength="6" #password="ngModel"
                                [ngClass]="{ 'is-invalid': f.submitted && password.errors }" />
                            <div *ngIf="password.errors && f.submitted" class="invalid-feedback">
                                <div *ngIf="password.errors['required']">Password is required</div>
                                <div *ngIf="password.errors['minlength']">
                                    Password must be at least 6 characters
                                </div>
                            </div>
                        </div>
                            <button class="login-button">
                                Login
                            </button>
                        <div class="form-group">
                            <div *ngIf="f.submitted && isLoginFailed" class="alert alert-danger" role="alert">
                                Login failed: {{ errorMessage }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="footer-link padding-top--24">
                <span>Don't have an account? <a href="/register">Sign up</a></span>
            </div>
        </form>
        <div class="alert alert-success" *ngIf="isLoggedIn">
            Logged in as {{ roles }}.
        </div>
    </div>
